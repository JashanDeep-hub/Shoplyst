<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title >Shoplyst</title>
    <link rel="icon" href="Images/LOGO.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet"> 
    <link rel="stylesheet" href="CSS/body.css">
    <link rel="stylesheet" href="CSS/header.css">
  </head>
  <body>
    <header>
      <div class="left-section">
        <img class="logo" src="Images/Web logo.jpg" alt="">
        <p class="logo-name">Shoplyst</p>
      </div>

      <div class="middle-section">
        <input class="search" type="text" placeholder="Search">
      </div>

      <div class="right-section">

        <button><a href="index.html">Home</a></button>

        <button><a href="Products.html">Products</a></button>

      </div>
    </header>

    <main>
      <div class="welcome-div">
        <h1>
          Welcome To Shoplyst
        </h1>
  
        <h2>
          We are a leading online shopping platform that offers a wide range of products at affordable prices.
        </h2>
      </div>

      <div class="signing-page">
        <div class="sign-up">
          <p>
            New User? Click Here
          </p>
          <button>
            <a href="Sign Up.html">Sign up</a>
          </button>  
        </div>  

        <div class="sign-in"> 
          <p>
            Old User? Click Here
          </p>  
          <button>
            <a href="Sign in.html">Sign In</a>
          </button>
        </div>
      </div> 
    </main>
  </body>
</html>
